# Social / contact (edit handles as needed)
social:
  github: j00x
  linkedin: ""
  email: ""

permalink: /azure/:year/:month/:day/:title/

markdown: kramdown
highlighter: rouge

sass:
  style: compressed

exclude:
  - Gemfile
  - Gemfile.lock
  - docs
  - README.md
  - vendor
  - .github

defaults:
