title: Adam Pratt
tagline: Cloud Architect · DevOps Engineer · Developer
description: >-
  Adam Pratt — Cloud Architect, DevOps Engineer, and Developer.
  Weekly Azure how-tos and lessons learned, plus a daily health research briefing.
author: Adam Pratt

# Served as a GitHub Pages project page under j00x.github.io.
# baseurl must match the repository name. Rename the repo to "apremote"
# so the site is served at https://j00x.github.io/apremote
url: "https://j00x.github.io"
baseurl: "/apremote"

# Social / contact (edit handles as needed)
social:
  github: j00x
  linkedin: ""
  email: ""

permalink: /azure/:year/:month/:day/:title/

markdown: kramdown
highlighter: rouge

sass:
  style: compressed

exclude:
  - Gemfile
  - Gemfile.lock
  - docs
  - README.md
  - vendor
  - .github

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
