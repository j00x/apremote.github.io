title: Adam Pratt
tagline: Cloud Architect · DevOps Engineer · Developer
description: >-
  Adam Pratt — Cloud Architect, DevOps Engineer, and Developer.
  Weekly Azure how-tos and lessons learned, plus a daily health research briefing.
author: Adam Pratt

# This is a PROJECT site under the j00x user site (which owns the custom
# domain learn.apnet-remote.net). It is served at the /apremote.github.io/
# subpath, so baseurl is the repo name. Do NOT add a CNAME here — the domain
# belongs to the j00x.github.io user-site repo.
# Live at: https://learn.apnet-remote.net/apremote.github.io/
url: "https://learn.apnet-remote.net"
baseurl: "/apremote.github.io"

# Social / contact (edit handles as needed)
social:
  github: j00x
  linkedin: ""
  email: ""

permalink: /azure/:year/:month/:day/:title/

markdown: kramdown
highlighter: rouge

sass:
  style: compressed

exclude:
  - Gemfile
  - Gemfile.lock
  - docs
  - README.md
  - vendor
  - .github
  - automation

defaults:
