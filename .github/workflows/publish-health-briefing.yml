name: Publish Health Briefing

# Generates the Daily Health Briefing with Azure OpenAI (following
# automation/health-briefing-agent.md + automation/memories.md) and opens a PR for review.
# Merge the PR to publish to https://learn.apnet-remote.net/apremote.github.io/health/
#
# Required repo SECRETS (Settings -> Secrets and variables -> Actions -> Secrets):
#   AZURE_OPENAI_ENDPOINT     e.g. https://my-aoai.openai.azure.com
#   AZURE_OPENAI_API_KEY      Azure OpenAI key
#   AZURE_OPENAI_DEPLOYMENT   the chat model deployment name (e.g. gpt-4o)
# Optional repo VARIABLE (Actions -> Variables):
#   AZURE_OPENAI_API_VERSION  defaults to 2024-10-21
#
# Until the secrets above are added, scheduled runs no-op (the preflight step skips
# generation), so the schedule never produces failing runs.

on:
  workflow_dispatch:
    inputs:
      date:
        description: "Briefing date (YYYY-MM-DD; blank = today, UTC)"
        required: false
        default: ""
  schedule:
    # Daily at 10:00 UTC. Adjust to land before the morning read in your timezone.
    - cron: "0 10 * * *"

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-and-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Preflight (skip if Azure OpenAI secrets are missing)
        id: preflight
        env:
          AOAI_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
        run: |
          if [ -z "$AOAI_KEY" ]; then
            echo "::warning::AZURE_OPENAI_API_KEY is not set — skipping generation. Add the Azure OpenAI secrets (see automation/README.md) to enable this workflow."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        if: steps.preflight.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        if: steps.preflight.outputs.skip != 'true'
        run: pip install -r automation/scripts/requirements.txt

      - name: Generate briefing
        id: gen
        if: steps.preflight.outputs.skip != 'true'
        env:
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_DEPLOYMENT: ${{ secrets.AZURE_OPENAI_DEPLOYMENT }}
          AZURE_OPENAI_API_VERSION: ${{ vars.AZURE_OPENAI_API_VERSION || '2024-10-21' }}
          BRIEFING_DATE: ${{ inputs.date }}
        run: |
          if [ -n "$BRIEFING_DATE" ]; then
            python automation/scripts/generate_health_briefing.py --date "$BRIEFING_DATE"
          else
            python automation/scripts/generate_health_briefing.py
          fi

      - name: Open pull request
        if: steps.preflight.outputs.skip != 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          branch: bot/health-briefing-${{ github.run_id }}
          title: "health: briefing for ${{ steps.gen.outputs.date }}"
          commit-message: "health: add briefing for ${{ steps.gen.outputs.date }}"
          body: |
            Automated draft from the **Health Briefing Agent**.

            - Date: `${{ steps.gen.outputs.date }}`
            - File: `${{ steps.gen.outputs.path }}`
            - Sections: `${{ steps.gen.outputs.sections }}`

            Review the briefing (verify every source resolves), then merge to publish to
            `https://learn.apnet-remote.net/apremote.github.io/health/`.

            > To publish daily with no review, switch this workflow to commit straight to
            > `main` instead of opening a PR (see `automation/README.md`).
          add-paths: |
            health/briefings/**
            health/index.json
          labels: |
            automated
            health-briefing
          draft: true
