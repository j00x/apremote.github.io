<!doctype html>
<html lang="en">
<head>
  {% include head.html %}
</head>
<body class="{{ page.body_class }}">
  {% include background.html %}
  {% include nav.html %}

  <main class="site-main" id="main">
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="site-footer__inner glass">
      <span>© {{ site.time | date: '%Y' }} {{ site.author }}</span>
      <span class="site-footer__tag">Cloud Architect · DevOps Engineer · Developer</span>
    </div>
  </footer>

  <script src="{{ '/assets/js/main.js' | relative_url }}"></script>
  {% if page.scripts %}{% for s in page.scripts %}<script src="{{ s | relative_url }}"></script>{% endfor %}{% endif %}
</body>
</html>
